[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
# Remove the password - use placeholder instead
sqlalchemy.url = postgresql+psycopg2://postgres:YOUR_PASSWORD_HERE@localhost:5433/rentora

[post_write_hooks]
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 88